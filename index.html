<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuxMusic Desktop</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        :root {
            --glow-color: rgba(255, 255, 255, 0.3);
            --hover-scale: 1.02;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Background with fallback */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            z-index: -1;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
            transition: all 0.2s;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        ::-webkit-scrollbar-corner {
            background: #0a0a0a;
        }

        /* Desktop title bar */
        .title-bar {
            height: 48px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid rgba(34, 34, 34, 0.5);
            -webkit-app-region: drag;
            app-region: drag;
            position: relative;
            z-index: 1000;
        }

        .title-bar-left {
            display: flex;
            align-items: center;
            gap: 16px;
            -webkit-app-region: no-drag;
            app-region: no-drag;
        }

        .app-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-weight: 500;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .app-title .material-symbols-outlined {
            color: #fff;
            font-size: 24px;
            animation: softGlow 2s infinite;
        }

        @keyframes softGlow {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
            50% { filter: drop-shadow(0 0 15px rgba(255,255,255,0.6)); }
        }

        .title-bar-right {
            display: flex;
            align-items: center;
            gap: 16px;
            -webkit-app-region: no-drag;
            app-region: no-drag;
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .window-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid #333;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.3, 1);
            -webkit-app-region: no-drag;
            app-region: no-drag;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
        }

        .window-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        .window-btn:hover::before {
            width: 100%;
            height: 100%;
        }

        .window-btn:hover {
            transform: scale(1.1);
            border-color: #666;
            box-shadow: 0 0 15px var(--glow-color);
        }

        .window-btn.close:hover {
            background: #f00;
            border-color: #f00;
        }

        .window-btn .material-symbols-outlined {
            font-size: 18px;
            position: relative;
            z-index: 1;
        }

        .nav-buttons {
            display: flex;
            gap: 8px;
        }

        .nav-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid #333;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.3, 1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .nav-btn:hover:not(.disabled) {
            transform: scale(1.1);
            border-color: #666;
            box-shadow: 0 0 15px var(--glow-color);
        }

        .nav-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .search-box {
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 200px;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .search-box:focus-within {
            border-color: #666;
            box-shadow: 0 0 15px var(--glow-color);
            width: 250px;
        }

        .search-box input {
            background: none;
            border: none;
            color: #fff;
            font-size: 14px;
            outline: none;
            width: 100%;
        }

        .search-box input::placeholder {
            color: #666;
        }

        .search-box .material-symbols-outlined {
            font-size: 18px;
            color: #666;
        }

        /* Main layout */
        .main-layout {
            display: flex;
            height: calc(100vh - 48px - 90px);
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-right: 1px solid rgba(34, 34, 34, 0.5);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-section {
            padding: 16px;
            border-bottom: 1px solid rgba(34, 34, 34, 0.5);
        }

        .sidebar-section:last-child {
            border-bottom: none;
        }

        .sidebar-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-radius: 6px;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.3, 1);
            margin-bottom: 4px;
            position: relative;
            overflow: hidden;
        }

        .sidebar-item::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        .sidebar-item:hover::before {
            width: 100%;
            height: 100%;
        }

        .sidebar-item:hover {
            background: rgba(26, 26, 26, 0.5);
            color: #fff;
            transform: translateX(5px);
        }

        .sidebar-item.active {
            background: rgba(42, 42, 42, 0.8);
            color: #fff;
            border-left: 3px solid #fff;
        }

        .sidebar-item .material-symbols-outlined {
            font-size: 20px;
            position: relative;
            z-index: 1;
        }

        .sidebar-item span {
            font-size: 14px;
            position: relative;
            z-index: 1;
        }

        .playlist-item {
            padding: 6px 12px;
            font-size: 13px;
            color: #aaa;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            margin-bottom: 2px;
        }

        .playlist-item:hover {
            color: #fff;
            background: rgba(26, 26, 26, 0.5);
            transform: translateX(3px);
        }

        /* Main content */
        .content {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            overflow-y: auto;
            padding: 24px;
        }

        .content-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .content-title {
            font-size: 24px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .view-options {
            display: flex;
            gap: 8px;
        }

        .view-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid #333;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .view-btn:hover,
        .view-btn.active {
            background: rgba(42, 42, 42, 0.8);
            color: #fff;
            border-color: #666;
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--glow-color);
        }

        /* Artist grid */
        .artist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .artist-card {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(34, 34, 34, 0.5);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .artist-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .artist-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: #666;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 20px var(--glow-color);
        }

        .artist-card:hover::before {
            opacity: 1;
        }

        .artist-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 12px;
            background: rgba(26, 26, 26, 0.8);
            border: 2px solid rgba(51, 51, 51, 0.5);
            overflow: hidden;
            transition: all 0.3s;
            position: relative;
        }

        .artist-card:hover .artist-avatar {
            border-color: #666;
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--glow-color);
        }

        .artist-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .artist-avatar .material-symbols-outlined {
            font-size: 48px;
            line-height: 120px;
            color: #666;
        }

        .artist-name {
            font-weight: 600;
            margin-bottom: 4px;
            color: #fff;
            transition: all 0.2s;
        }

        .artist-card:hover .artist-name {
            text-shadow: 0 0 10px var(--glow-color);
        }

        .artist-type {
            font-size: 12px;
            color: #888;
        }

        /* Track list */
        .track-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .track-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(34, 34, 34, 0.5);
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .track-item::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        .track-item:hover::before {
            width: 100%;
            height: 100%;
        }

        .track-item:hover {
            background: rgba(26, 26, 26, 0.8);
            border-color: #444;
            transform: translateX(3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .track-item.playing {
            background: rgba(42, 42, 42, 0.9);
            border-color: #666;
            box-shadow: 0 0 20px var(--glow-color);
        }

        .track-item.playing .track-title {
            text-shadow: 0 0 10px var(--glow-color);
        }

        .track-number {
            width: 24px;
            text-align: center;
            color: #888;
            font-size: 14px;
            position: relative;
            z-index: 1;
        }

        .track-cover {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            background: rgba(26, 26, 26, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            z-index: 1;
            transition: all 0.2s;
        }

        .track-item:hover .track-cover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--glow-color);
        }

        .track-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .track-cover .material-symbols-outlined {
            font-size: 20px;
            color: #666;
        }

        .track-info {
            flex: 1;
            min-width: 0;
            position: relative;
            z-index: 1;
        }

        .track-title {
            font-weight: 500;
            margin-bottom: 4px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s;
        }

        .track-artist {
            font-size: 12px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-genre {
            font-size: 11px;
            color: #666;
            background: rgba(26, 26, 26, 0.5);
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .track-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
            position: relative;
            z-index: 1;
        }

        .track-item:hover .track-actions {
            opacity: 1;
        }

        .track-action-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(42, 42, 42, 0.8);
            border: 1px solid #444;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .track-action-btn:hover {
            background: rgba(58, 58, 58, 0.9);
            border-color: #666;
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--glow-color);
        }

        .track-action-btn .material-symbols-outlined {
            font-size: 16px;
        }

        /* Artist detail view */
        .artist-header {
            display: flex;
            gap: 24px;
            margin-bottom: 32px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(34, 34, 34, 0.5);
            border-radius: 12px;
            padding: 24px;
        }

        .artist-large-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: rgba(26, 26, 26, 0.8);
            border: 3px solid rgba(51, 51, 51, 0.5);
            overflow: hidden;
        }

        .artist-large-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .artist-large-avatar .material-symbols-outlined {
            font-size: 60px;
            line-height: 150px;
            color: #666;
        }

        .artist-info {
            flex: 1;
        }

        .artist-badge {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .artist-large-name {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 16px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .artist-stats {
            display: flex;
            gap: 24px;
            color: #888;
            font-size: 14px;
        }

        .play-all-btn {
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            border: none;
            border-radius: 24px;
            padding: 10px 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.3, 1);
            margin-top: 16px;
            position: relative;
            overflow: hidden;
        }

        .play-all-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        .play-all-btn:hover::before {
            width: 100%;
            height: 100%;
        }

        .play-all-btn:hover {
            transform: scale(1.05);
            background: #fff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        /* Player bar */
        .player-bar {
            height: 90px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(34, 34, 34, 0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            position: relative;
            z-index: 100;
        }

        .player-left {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 30%;
        }

        .player-cover {
            width: 56px;
            height: 56px;
            border-radius: 6px;
            background: rgba(26, 26, 26, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            animation: pulseCover 2s infinite;
        }

        @keyframes pulseCover {
            0%, 100% { box-shadow: 0 0 15px rgba(255,255,255,0.1); }
            50% { box-shadow: 0 0 30px rgba(255,255,255,0.3); }
        }

        .player-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: rotateCover 10s linear infinite;
        }

        @keyframes rotateCover {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .player-cover .material-symbols-outlined {
            font-size: 28px;
            color: #666;
        }

        .player-track-info {
            flex: 1;
            min-width: 0;
        }

        .player-track-title {
            font-weight: 500;
            margin-bottom: 4px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-track-artist {
            font-size: 12px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-center {
            width: 40%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .player-control-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .player-control-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        .player-control-btn:hover::before {
            width: 100%;
            height: 100%;
        }

        .player-control-btn:hover {
            color: #fff;
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--glow-color);
        }

        .player-control-btn.play-pause {
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            width: 40px;
            height: 40px;
        }

        .player-control-btn.play-pause:hover {
            transform: scale(1.1);
            background: #fff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .player-control-btn.active {
            color: #fff;
        }

        .player-control-btn.repeat.active,
        .player-control-btn.shuffle.active {
            color: #4CAF50;
        }

        .player-progress {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .progress-time {
            color: #888;
            font-size: 11px;
            min-width: 35px;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(51, 51, 51, 0.5);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            transition: height 0.2s;
        }

        .progress-bar:hover {
            height: 6px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #fff, rgba(255,255,255,0.5));
            border-radius: 2px;
            width: 0%;
            position: relative;
            transition: width 0.1s linear;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: -4px;
            top: -4px;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 0 10px #fff;
        }

        .progress-bar:hover .progress-fill::after {
            opacity: 1;
        }

        .player-right {
            width: 30%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 120px;
        }

        .volume-icon {
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
        }

        .volume-icon:hover {
            color: #fff;
            transform: scale(1.1);
        }

        .volume-bar {
            flex: 1;
            height: 4px;
            background: rgba(51, 51, 51, 0.5);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            transition: height 0.2s;
        }

        .volume-bar:hover {
            height: 6px;
        }

        .volume-fill {
            height: 100%;
            background: linear-gradient(90deg, #fff, rgba(255,255,255,0.5));
            border-radius: 2px;
            width: 100%;
            position: relative;
        }

        .volume-fill::after {
            content: '';
            position: absolute;
            right: -4px;
            top: -4px;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 0 10px #fff;
        }

        .volume-bar:hover .volume-fill::after {
            opacity: 1;
        }

        /* Tooltip */
        [data-tooltip] {
            position: relative;
        }

        [data-tooltip]:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            border: 1px solid #333;
            pointer-events: none;
            z-index: 1000;
            margin-bottom: 5px;
            box-shadow: 0 0 15px var(--glow-color);
        }

        .hidden {
            display: none;
        }

        .loading, .error {
            text-align: center;
            padding: 48px;
            color: #888;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }

            .sidebar-item span:not(.material-symbols-outlined) {
                display: none;
            }

            .sidebar-item {
                justify-content: center;
            }

            .sidebar-title {
                text-align: center;
            }

            .playlist-item {
                text-align: center;
                font-size: 11px;
            }

            .artist-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .player-left, .player-right {
                width: 20%;
            }

            .player-center {
                width: 60%;
            }

            .search-box {
                width: 150px;
            }

            .search-box:focus-within {
                width: 200px;
            }
        }

        @media (max-width: 480px) {
            .player-bar {
                flex-direction: column;
                height: auto;
                padding: 10px;
                gap: 10px;
            }

            .player-left, .player-center, .player-right {
                width: 100%;
            }

            .player-right {
                justify-content: center;
            }

            .volume-control {
                width: 100%;
            }

            .artist-large-name {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="title-bar">
        <div class="title-bar-left">
            <div class="app-title" data-tooltip="TuxMusic Desktop">
                <span class="material-symbols-outlined">owl</span>
                <span>TuxMusic Desktop</span>
            </div>
        </div>
        <div class="title-bar-right">
            <div class="nav-buttons">
                <div class="nav-btn" id="backBtn" onclick="navigateBack()" data-tooltip="Go back">
                    <span class="material-symbols-outlined">chevron_left</span>
                </div>
                <div class="nav-btn" id="forwardBtn" onclick="navigateForward()" data-tooltip="Go forward">
                    <span class="material-symbols-outlined">chevron_right</span>
                </div>
            </div>
            <div class="search-box">
                <span class="material-symbols-outlined">search</span>
                <input type="text" placeholder="Search tracks, artists..." id="searchInput">
            </div>
            <div class="window-controls">
                <div class="window-btn" onclick="windowControls('minimize')" data-tooltip="Minimize">
                    <span class="material-symbols-outlined">remove</span>
                </div>
                <div class="window-btn" onclick="windowControls('maximize')" data-tooltip="Maximize">
                    <span class="material-symbols-outlined">check_box_outline_blank</span>
                </div>
                <div class="window-btn close" onclick="windowControls('close')" data-tooltip="Close">
                    <span class="material-symbols-outlined">close</span>
                </div>
            </div>
        </div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-item active" onclick="showView('home')" data-tooltip="Home">
                    <span class="material-symbols-outlined">home</span>
                    <span>Home</span>
                </div>
                <div class="sidebar-item" onclick="showView('search')" data-tooltip="Search">
                    <span class="material-symbols-outlined">search</span>
                    <span>Search</span>
                </div>
                <div class="sidebar-item" onclick="showView('library')" data-tooltip="Your Library">
                    <span class="material-symbols-outlined">library_music</span>
                    <span>Your Library</span>
                </div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-title">PLAYLISTS</div>
                <div class="playlist-item" onclick="showView('all-tracks')" data-tooltip="All Tracks">
                    All Tracks
                </div>
                <div class="playlist-item" onclick="showView('all-artists')" data-tooltip="All Artists">
                    All Artists
                </div>
                <div class="playlist-item" onclick="showView('recent')" data-tooltip="Recently Added">
                    Recently Added
                </div>
            </div>
        </div>

        <div class="content" id="content"></div>
    </div>

    <div class="player-bar" id="playerBar" style="display: none;">
        <div class="player-left">
            <div class="player-cover" id="playerCover" data-tooltip="Now playing">
                <span class="material-symbols-outlined">music_note</span>
            </div>
            <div class="player-track-info">
                <div class="player-track-title" id="playerTrackTitle">Not playing</div>
                <div class="player-track-artist" id="playerTrackArtist">Select a track</div>
            </div>
        </div>
        <div class="player-center">
            <div class="player-controls">
                <button class="player-control-btn shuffle" id="shuffleBtn" onclick="toggleShuffle()" data-tooltip="Shuffle">
                    <span class="material-symbols-outlined">shuffle</span>
                </button>
                <button class="player-control-btn" onclick="playPrevious()" data-tooltip="Previous">
                    <span class="material-symbols-outlined">skip_previous</span>
                </button>
                <button class="player-control-btn play-pause" id="playPauseBtn" onclick="togglePlayPause()" data-tooltip="Play/Pause">
                    <span class="material-symbols-outlined">play_arrow</span>
                </button>
                <button class="player-control-btn" onclick="playNext()" data-tooltip="Next">
                    <span class="material-symbols-outlined">skip_next</span>
                </button>
                <button class="player-control-btn repeat" id="repeatBtn" onclick="toggleRepeat()" data-tooltip="Repeat">
                    <span class="material-symbols-outlined">repeat</span>
                </button>
            </div>
            <div class="player-progress">
                <span class="progress-time" id="currentTime">0:00</span>
                <div class="progress-bar" id="playerProgressBar" onclick="seek(event)" onmousemove="seekDrag(event)" onmouseup="stopSeekDrag()" onmouseleave="stopSeekDrag()">
                    <div class="progress-fill" id="playerProgressFill"></div>
                </div>
                <span class="progress-time" id="duration">0:00</span>
            </div>
        </div>
        <div class="player-right">
            <div class="volume-control">
                <span class="material-symbols-outlined volume-icon" id="volumeIcon" onclick="toggleMute()" data-tooltip="Mute/Unmute">volume_up</span>
                <div class="volume-bar" id="volumeBar" onclick="setVolume(event)" onmousemove="setVolumeDrag(event)" onmouseup="stopVolumeDrag()" onmouseleave="stopVolumeDrag()">
                    <div class="volume-fill" id="volumeFill"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Проверка User Agent
        const userAgent = navigator.userAgent;
        if (!userAgent.includes('TuxMusic/0.1.0')) {
            window.location.href = 'https://tuxmusic.vercel.app';
        }

        // Глобальные переменные
        let library = null;
        let currentView = 'home';
        let currentArtist = null;
        let currentTrack = null;
        let currentTrackIndex = -1;
        let currentPlaylist = [];
        let audio = new Audio();
        let isPlaying = false;
        let volume = 1;
        let muted = false;
        let shuffle = false;
        let repeat = false;
        let history = [];
        let historyIndex = -1;
        let isSeeking = false;
        let isVolumeDragging = false;

        // DOM элементы
        const content = document.getElementById('content');
        const playerBar = document.getElementById('playerBar');
        const playerCover = document.getElementById('playerCover');
        const playerTrackTitle = document.getElementById('playerTrackTitle');
        const playerTrackArtist = document.getElementById('playerTrackArtist');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const currentTimeSpan = document.getElementById('currentTime');
        const durationSpan = document.getElementById('duration');
        const progressFill = document.getElementById('playerProgressFill');
        const progressBar = document.getElementById('playerProgressBar');
        const volumeFill = document.getElementById('volumeFill');
        const volumeIcon = document.getElementById('volumeIcon');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const repeatBtn = document.getElementById('repeatBtn');
        const backBtn = document.getElementById('backBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const searchInput = document.getElementById('searchInput');

        // Управление окном Tauri
        function windowControls(action) {
            if (window.__TAURI__) {
                const { appWindow } = window.__TAURI__.window;
                if (action === 'minimize') appWindow.minimize();
                else if (action === 'maximize') appWindow.toggleMaximize();
                else if (action === 'close') appWindow.close();
            }
        }

        // Загрузка библиотеки
        async function loadLibrary() {
            try {
                const response = await fetch('/manifest.json?t=' + Date.now());
                if (!response.ok) throw new Error('Failed to load');
                library = await response.json();
                showView('home');
            } catch (error) {
                content.innerHTML = '<div class="error">Failed to load music library</div>';
            }
        }

        // Навигация
        function navigateTo(view, data = null) {
            if (historyIndex < history.length - 1) {
                history = history.slice(0, historyIndex + 1);
            }
            
            history.push({ view, data });
            historyIndex = history.length - 1;
            
            updateNavButtons();
            
            if (view === 'home') showHome();
            else if (view === 'artist') showArtist(data);
            else if (view === 'track') playTrack(data);
            else if (view === 'all-tracks') showAllTracks();
            else if (view === 'all-artists') showAllArtists();
            else if (view === 'search') showSearch(searchInput.value);
        }

        function navigateBack() {
            if (historyIndex > 0) {
                historyIndex--;
                const entry = history[historyIndex];
                if (entry.view === 'home') showHome();
                else if (entry.view === 'artist') showArtist(entry.data);
                else if (entry.view === 'track') playTrack(entry.data);
                else if (entry.view === 'all-tracks') showAllTracks();
                else if (entry.view === 'all-artists') showAllArtists();
                updateNavButtons();
            }
        }

        function navigateForward() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                const entry = history[historyIndex];
                if (entry.view === 'home') showHome();
                else if (entry.view === 'artist') showArtist(entry.data);
                else if (entry.view === 'track') playTrack(entry.data);
                else if (entry.view === 'all-tracks') showAllTracks();
                else if (entry.view === 'all-artists') showAllArtists();
                updateNavButtons();
            }
        }

        function updateNavButtons() {
            backBtn.classList.toggle('disabled', historyIndex <= 0);
            forwardBtn.classList.toggle('disabled', historyIndex >= history.length - 1);
        }

        function showView(view) {
            navigateTo(view);
        }

        function showHome() {
            currentView = 'home';
            if (!library) return;
            
            let html = `
                <div class="content-header">
                    <div class="content-title">Home</div>
                </div>
                <h2 class="section-title">Artists</h2>
                <div class="artist-grid">
            `;
            
            library.artists.forEach(artist => {
                html += `
                    <div class="artist-card" onclick="navigateTo('artist', '${artist.nick}')">
                        <div class="artist-avatar">
                            ${artist.hasProfile ? 
                                `<img src="/author/${artist.nick}/profile.png" alt="${artist.name}">` : 
                                `<span class="material-symbols-outlined">person</span>`
                            }
                        </div>
                        <div class="artist-name">${escapeHtml(artist.name)}</div>
                        <div class="artist-type">${artist.trackCount} tracks</div>
                    </div>
                `;
            });
            
            html += `</div><h2 class="section-title">All Tracks</h2><div class="track-list">`;
            
            library.tracks.forEach((track, index) => {
                html += renderTrackItem(track, index);
            });
            
            html += '</div>';
            content.innerHTML = html;
        }

        function showAllArtists() {
            if (!library) return;
            
            let html = `
                <div class="content-header">
                    <div class="content-title">All Artists</div>
                </div>
                <div class="artist-grid">
            `;
            
            library.artists.forEach(artist => {
                html += `
                    <div class="artist-card" onclick="navigateTo('artist', '${artist.nick}')">
                        <div class="artist-avatar">
                            ${artist.hasProfile ? 
                                `<img src="/author/${artist.nick}/profile.png" alt="${artist.name}">` : 
                                `<span class="material-symbols-outlined">person</span>`
                            }
                        </div>
                        <div class="artist-name">${escapeHtml(artist.name)}</div>
                        <div class="artist-type">${artist.trackCount} tracks</div>
                    </div>
                `;
            });
            
            html += '</div>';
            content.innerHTML = html;
        }

        function showAllTracks() {
            if (!library) return;
            
            let html = `
                <div class="content-header">
                    <div class="content-title">All Tracks</div>
                    <div class="view-options">
                        <div class="view-btn active" onclick="sortTracks('title')">
                            <span class="material-symbols-outlined">sort_by_alpha</span>
                        </div>
                        <div class="view-btn" onclick="sortTracks('artist')">
                            <span class="material-symbols-outlined">person</span>
                        </div>
                        <div class="view-btn" onclick="sortTracks('genre')">
                            <span class="material-symbols-outlined">music_note</span>
                        </div>
                    </div>
                </div>
                <div class="track-list">
            `;
            
            library.tracks.forEach((track, index) => {
                html += renderTrackItem(track, index);
            });
            
            html += '</div>';
            content.innerHTML = html;
        }

        function showArtist(artistNick) {
            if (!library) return;
            
            const artist = library.artists.find(a => a.nick === artistNick);
            const tracks = library.tracks.filter(t => t.artistNick === artistNick);
            
            if (!artist) return;
            
            let html = `
                <div class="artist-header">
                    <div class="artist-large-avatar">
                        ${artist.hasProfile ? 
                            `<img src="/author/${artist.nick}/profile.png" alt="${artist.name}">` : 
                            `<span class="material-symbols-outlined">person</span>`
                        }
                    </div>
                    <div class="artist-info">
                        <div class="artist-badge">ARTIST</div>
                        <div class="artist-large-name">${escapeHtml(artist.name)}</div>
                        <div class="artist-stats">
                            <span>${tracks.length} tracks</span>
                        </div>
                        <button class="play-all-btn" onclick="playAllTracks('${artistNick}')">
                            <span class="material-symbols-outlined" style="font-size: 18px;">play_arrow</span>
                            Play All
                        </button>
                    </div>
                </div>
                <div class="track-list">
            `;
            
            tracks.forEach((track, index) => {
                html += renderTrackItem(track, index, artistNick);
            });
            
            html += '</div>';
            content.innerHTML = html;
        }

        function showSearch(query) {
            if (!library) return;
            
            const q = query.toLowerCase();
            const trackResults = library.tracks.filter(t => 
                t.title.toLowerCase().includes(q) ||
                t.artistName.toLowerCase().includes(q) ||
                t.genre.toLowerCase().includes(q)
            );
            
            const artistResults = library.artists.filter(a => 
                a.name.toLowerCase().includes(q)
            );
            
            let html = `
                <div class="content-header">
                    <div class="content-title">Search: "${escapeHtml(query)}"</div>
                </div>
            `;
            
            if (artistResults.length > 0) {
                html += `<h2 class="section-title">Artists</h2><div class="artist-grid">`;
                artistResults.forEach(artist => {
                    html += `
                        <div class="artist-card" onclick="navigateTo('artist', '${artist.nick}')">
                            <div class="artist-avatar">
                                ${artist.hasProfile ? 
                                    `<img src="/author/${artist.nick}/profile.png" alt="${artist.name}">` : 
                                    `<span class="material-symbols-outlined">person</span>`
                                }
                            </div>
                            <div class="artist-name">${escapeHtml(artist.name)}</div>
                            <div class="artist-type">${artist.trackCount} tracks</div>
                        </div>
                    `;
                });
                html += '</div>';
            }
            
            if (trackResults.length > 0) {
                html += `<h2 class="section-title">Tracks</h2><div class="track-list">`;
                trackResults.forEach((track, index) => {
                    html += renderTrackItem(track, index);
                });
                html += '</div>';
            }
            
            if (artistResults.length === 0 && trackResults.length === 0) {
                html += '<div class="no-content">No results found</div>';
            }
            
            content.innerHTML = html;
        }

        function renderTrackItem(track, index, artistNick = null) {
            const isPlaying = currentTrack && currentTrack.name === track.name && currentTrack.artistNick === track.artistNick;
            return `
                <div class="track-item ${isPlaying ? 'playing' : ''}" onclick="playTrackByIndex(${index}, '${artistNick || ''}')">
                    <span class="track-number">${index + 1}</span>
                    <div class="track-cover">
                        ${track.hasCover ? 
                            `<img src="/author/${track.artistNick}/songs/${track.name}/cover.jpg" alt="${track.title}">` : 
                            `<span class="material-symbols-outlined">music_note</span>`
                        }
                    </div>
                    <div class="track-info">
                        <div class="track-title">${escapeHtml(track.title)}</div>
                        <div class="track-artist">${escapeHtml(track.artistName)}</div>
                    </div>
                    <span class="track-genre">${escapeHtml(track.genre)}</span>
                    <div class="track-actions">
                        <div class="track-action-btn" onclick="event.stopPropagation(); addToQueue('${track.artistNick}', '${track.name}')" data-tooltip="Add to queue">
                            <span class="material-symbols-outlined">playlist_add</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function playTrack(track) {
            if (!track) return;
            
            // Анимация перехода
            if (currentTrack) {
                document.querySelectorAll('.track-item.playing').forEach(el => {
                    el.style.animation = 'fadeOut 0.3s';
                });
            }
            
            currentTrack = track;
            currentTrackIndex = currentPlaylist.findIndex(t => t.name === track.name && t.artistNick === track.artistNick);
            
            const audioUrl = `/author/${track.artistNick}/songs/${track.name}/track.mp3`;
            audio.src = audioUrl;
            audio.load();
            
            playerBar.style.display = 'flex';
            playerTrackTitle.textContent = track.title;
            playerTrackArtist.textContent = track.artistName;
            
            if (track.hasCover) {
                playerCover.innerHTML = `<img src="/author/${track.artistNick}/songs/${track.name}/cover.jpg" alt="${track.title}">`;
            } else {
                playerCover.innerHTML = '<span class="material-symbols-outlined">music_note</span>';
            }
            
            play();
        }

        function playTrackByIndex(index, artistNick = null) {
            let track;
            if (artistNick) {
                const tracks = library.tracks.filter(t => t.artistNick === artistNick);
                track = tracks[index];
                currentPlaylist = tracks;
            } else {
                track = library.tracks[index];
                currentPlaylist = library.tracks;
            }
            playTrack(track);
        }

        function playAllTracks(artistNick) {
            const tracks = library.tracks.filter(t => t.artistNick === artistNick);
            if (tracks.length > 0) {
                currentPlaylist = tracks;
                playTrack(tracks[0]);
            }
        }

        function play() {
            audio.play();
            isPlaying = true;
            playPauseBtn.innerHTML = '<span class="material-symbols-outlined">pause</span>';
        }

        function pause() {
            audio.pause();
            isPlaying = false;
            playPauseBtn.innerHTML = '<span class="material-symbols-outlined">play_arrow</span>';
        }

        function togglePlayPause() {
            if (isPlaying) {
                pause();
            } else {
                play();
            }
        }

        function playNext() {
            if (currentPlaylist.length === 0) return;
            
            let nextIndex;
            if (shuffle) {
                do {
                    nextIndex = Math.floor(Math.random() * currentPlaylist.length);
                } while (nextIndex === currentTrackIndex && currentPlaylist.length > 1);
            } else {
                nextIndex = currentTrackIndex + 1;
                if (nextIndex >= currentPlaylist.length) {
                    if (repeat) {
                        nextIndex = 0;
                    } else {
                        return;
                    }
                }
            }
            
            playTrack(currentPlaylist[nextIndex]);
        }

        function playPrevious() {
            if (currentPlaylist.length === 0) return;
            
            let prevIndex = currentTrackIndex - 1;
            if (prevIndex < 0) {
                if (repeat) {
                    prevIndex = currentPlaylist.length - 1;
                } else {
                    return;
                }
            }
            
            playTrack(currentPlaylist[prevIndex]);
        }

        function toggleShuffle() {
            shuffle = !shuffle;
            shuffleBtn.classList.toggle('active', shuffle);
        }

        function toggleRepeat() {
            repeat = !repeat;
            repeatBtn.classList.toggle('active', repeat);
        }

        function seek(event) {
            const rect = progressBar.getBoundingClientRect();
            const percent = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
            audio.currentTime = percent * audio.duration;
        }

        function seekDrag(event) {
            if (isSeeking) {
                seek(event);
            }
        }

        function startSeekDrag() {
            isSeeking = true;
        }

        function stopSeekDrag() {
            isSeeking = false;
        }

        function setVolume(event) {
            const rect = document.getElementById('volumeBar').getBoundingClientRect();
            const percent = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
            volume = percent;
            audio.volume = muted ? 0 : volume;
            volumeFill.style.width = (percent * 100) + '%';
            updateVolumeIcon();
        }

        function setVolumeDrag(event) {
            if (isVolumeDragging) {
                setVolume(event);
            }
        }

        function startVolumeDrag() {
            isVolumeDragging = true;
        }

        function stopVolumeDrag() {
            isVolumeDragging = false;
        }

        function toggleMute() {
            muted = !muted;
            audio.volume = muted ? 0 : volume;
            updateVolumeIcon();
        }

        function updateVolumeIcon() {
            if (muted || volume === 0) {
                volumeIcon.textContent = 'volume_off';
            } else if (volume < 0.5) {
                volumeIcon.textContent = 'volume_down';
            } else {
                volumeIcon.textContent = 'volume_up';
            }
        }

        function addToQueue(artistNick, trackName) {
            const track = library.tracks.find(t => t.artistNick === artistNick && t.name === trackName);
            if (track) {
                currentPlaylist.push(track);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Drag handlers
        progressBar.addEventListener('mousedown', startSeekDrag);
        progressBar.addEventListener('mousemove', seekDrag);
        progressBar.addEventListener('mouseup', stopSeekDrag);
        progressBar.addEventListener('mouseleave', stopSeekDrag);

        const volumeBar = document.getElementById('volumeBar');
        volumeBar.addEventListener('mousedown', startVolumeDrag);
        volumeBar.addEventListener('mousemove', setVolumeDrag);
        volumeBar.addEventListener('mouseup', stopVolumeDrag);
        volumeBar.addEventListener('mouseleave', stopVolumeDrag);

        // Audio events
        audio.addEventListener('timeupdate', () => {
            if (audio.duration && !isSeeking) {
                const current = audio.currentTime;
                const duration = audio.duration;
                const percent = (current / duration) * 100;
                
                currentTimeSpan.textContent = formatTime(current);
                durationSpan.textContent = formatTime(duration);
                progressFill.style.width = percent + '%';
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            durationSpan.textContent = formatTime(audio.duration);
        });

        audio.addEventListener('ended', () => {
            playNext();
        });

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Search
        searchInput.addEventListener('input', (e) => {
            if (e.target.value.length > 0) {
                showSearch(e.target.value);
            } else {
                showView('home');
            }
        });

        // Load library
        loadLibrary();
    </script>
</body>
</html>
